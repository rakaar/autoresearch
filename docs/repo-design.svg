      .small { font: 18px "Comic Sans MS", "Trebuchet MS", sans-serif; fill: #7f7f7f; }
      .greenstroke { stroke: #bfe8c7; stroke-width: 3; fill: none; }
      .greenbox { stroke: #8bc89b; stroke-width: 2; fill: none; }
      .grayline { stroke: #7f7f7f; stroke-width: 2; fill: none; marker-end: url(#arrow-gray); }
      .greenline { stroke: #bfe8c7; stroke-width: 5; fill: none; marker-end: url(#arrow-green); }
